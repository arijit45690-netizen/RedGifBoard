name: Build RedGifBoard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bootstrap Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sLo /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          find /tmp/gradle-dist -name "gradle-wrapper.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RedGifBoard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
